name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, test (100% coverage gate), Sonar quality gate
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Sonar needs full history to attribute new code correctly
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test (fails below 100% line/branch coverage)
        run: mvn -B clean verify

      - name: SonarCloud analysis + quality gate
        if: env.SONAR_TOKEN != ''
        run: mvn -B sonar:sonar -Dsonar.qualitygate.wait=true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/'
          retention-days: 14
